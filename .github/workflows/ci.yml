name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore backend/PulseCheck.Tests/PulseCheck.Tests.csproj
      - name: Build
        run: dotnet build backend/PulseCheck.Tests/PulseCheck.Tests.csproj --configuration Release --no-restore
      - name: Test
        run: dotnet test backend/PulseCheck.Tests/PulseCheck.Tests.csproj --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
